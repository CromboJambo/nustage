[package]
name = "nustage"
version = "0.1.0"
edition = "2021"

[dependencies]
# TUI Framework
ratatui = "0.26"

# Data Processing
duckdb = { version = "0.10", features = ["bundled"] }
calamine = { version = "0.24", features = ["xlsx", "parquet"] }
polars = { version = "0.36", features = ["lazy", "dtype-datetime", "dtype-categorical"] }

# CLI Argument Parsing
clap = { version = "4.4", features = ["derive"] }

# Error Handling
thiserror = "1.0"
anyhow = "1.0"

# Data Serialization/Deserialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
